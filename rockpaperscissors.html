<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <style>
        *{
          
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            background-color:#667eea;
        }

        h1{
            color:white;
            margin-bottom:30px;
        }

        .choices{
            display:flex;
            gap:30px;
        }

        .choices img{
            width:150px;
            height:150px;
            border-radius:50%;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

    
        #result{
            margin-top:30px;
            font-size:32px;
            font-weight:bold;
            color:white;
        }

        #computer{
            margin-top:10px;
            font-size:22px;
            color:white;
        }
    </style>
</head>
<body>

    <h1>Rock Paper Scissors</h1>

    <div class="choices">
        <img src="rock.png" alt="Rock" onclick="play('rock')">
        <img src="paper.png" alt="Paper" onclick="play('paper')">
        <img src="Scissors.jpg" alt="Scissors" onclick="play('scissors')">
    </div>

    <p id="result"></p>
    <p id="computer"></p>

    <script>
        function play(playerchoice){
            let choice=Math.floor(Math.random()*3);

            if (choice==0 && playerchoice=="rock" ||
                choice==1 && playerchoice=="paper" ||
                choice==2 && playerchoice=="scissors"){

                document.getElementById("result").textContent="It's a tie!";
            }
            else if (choice==0 && playerchoice=="scissors" ||
                     choice==1 && playerchoice=="rock" ||
                     choice==2 && playerchoice=="paper"){

                document.getElementById("result").textContent="You lost!";
            }
            else {
                document.getElementById("result").textContent="You win!";
            }

            if (choice==0){
                document.getElementById("computer").textContent="Computer chose: Rock";
            }
            else if (choice==1){
                document.getElementById("computer").textContent="Computer chose: Paper";
            }
            else{
                document.getElementById("computer").textContent="Computer chose: Scissors";
            }
        }
    </script>

</body>
</html>
